/**
 * Top-level build file for ftc_app project.
 *
 * It is extraordinarily rare that you will ever need to edit this file.
 */

buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        // Note for FTC Teams: Do not modify this yourself.
        classpath 'com.android.tools.build:gradle:8.7.0'
    }
}

// This is now required because aapt2 has to be downloaded from the
// google() repository beginning with version 3.2 of the Android Gradle Plugin
allprojects {
    repositories {
        mavenCentral()
        google()
    }

    // Redirect build output outside of OneDrive to prevent sync conflicts
    buildDir = "${System.getProperty('user.home')}/.gradle/ftc-builds/${rootProject.name}/${project.name}"

    // Suppress all javac warnings and notes (obsolete source/target, deprecated API, etc.)
    tasks.withType(JavaCompile).configureEach {
        options.warnings = false
    }
}

repositories {
    mavenCentral()
}
